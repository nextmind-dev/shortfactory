<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShortFactory</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#0f172a;
            color:white;
            font-family:Arial,Helvetica,sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            text-align:center;
            padding:30px;
        }

        .container{
            max-width:800px;
        }

        h1{
            font-size:56px;
            margin-bottom:20px;
        }

        p{
            font-size:20px;
            color:#cbd5e1;
            line-height:1.7;
            margin-bottom:40px;
        }

        .badge{
            display:inline-block;
            background:#2563eb;
            padding:12px 24px;
            border-radius:999px;
            font-weight:bold;
            margin-bottom:40px;
        }

        footer{
            margin-top:50px;
        }

        footer a{
            color:#60a5fa;
            text-decoration:none;
            margin:0 15px;
        }

        footer a:hover{
            text-decoration:underline;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="badge">
        Coming Soon
    </div>

    <h1>ShortFactory</h1>

    <p>
        AI-powered platform for creating and publishing short-form videos
        across multiple social media platforms.
    </p>

    <footer>
        <a href="privacy.html">Privacy Policy</a>
        <a href="terms.html">Terms of Service</a>
    </footer>

</div>

</body>
</html>
